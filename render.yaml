services:
  - type: web
    name: portfolio-fullstack
    runtime: node
    plan: starter
    buildCommand: npm ci --prefix backend && npm ci --prefix frontend && npm run build --prefix frontend
    preDeployCommand: npm run db:init --prefix backend
    startCommand: npm start --prefix backend
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: MAX_FILE_SIZE
        value: 5242880
      - key: UPLOAD_PATH
        value: /opt/render/project/src/backend/uploads
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: portfolio-uploads
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 5

databases:
  - name: portfolio-db
    plan: free
